services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: skyraksys_hrm_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-skyraksys_hrm}
      POSTGRES_USER: ${DB_USER:-hrm_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    # DB port intentionally NOT exposed to host — access via Docker network only.
    # To connect from host for debugging: docker compose exec postgres psql ...
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Only run the extensions init script on first container start.
      # schema_dump.sql lives in the same folder but must NOT be auto-run:
      # it creates all tables, which would conflict with Sequelize migrations.
      # Migrations are run explicitly by the deploy script after the DB is up.
      - ./database/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    networks:
      - hrm_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hrm_admin} -d ${DB_NAME:-skyraksys_hrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyraksys_hrm_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-skyraksys_hrm}
      DB_USER: ${DB_USER:-hrm_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://skyait.skyraksys.com,http://skyait.skyraksys.com,http://46.225.73.94}
      TRUST_PROXY: "true"
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-admin123}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@skyraksys.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    # Backend port intentionally NOT exposed to host — nginx proxies all traffic.
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrm_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    container_name: skyraksys_hrm_frontend
    # Frontend port intentionally NOT exposed to host — nginx proxies all traffic.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrm_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Mobile Web App (Expo web export, served to mobile browsers)
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: skyraksys_hrm_mobile
    # Mobile port intentionally NOT exposed to host — nginx proxies all traffic.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrm_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: skyraksys_hrm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      mobile:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - hrm_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skyraksys_hrm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@skyraksys.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - hrm_network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  hrm_network:
    driver: bridge
