server {
    listen 3001;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE: /api calls are NOT proxied here.
    # All API requests from the browser go to the outer nginx (port 80/443)
    # which routes them to backend:5000 with proper rate limiting and CORS.
    # A proxy block here would bypass those controls.

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
